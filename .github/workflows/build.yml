name: Deploy EXE using S3 Versioning

on:
  workflow_dispatch:
  push:
    branches:
      - versioning

permissions:
  id-token: write
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    env:
      BUCKET: github-actions-go-s3-deploy-versioning 
      FILE: app.exe

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build exe
        run: |
          GOOS=windows GOARCH=amd64 \
          go build -o $FILE

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::119807136885:role/github-actions-go-s3-deploy
          aws-region: ap-south-1

      - name: Capture current version
        id: previous
        run: |

          VERSION=$(
            aws s3api list-object-versions \
              --bucket $BUCKET \
              --prefix $FILE \
              --query 'Versions[0].VersionId' \
              --output text 2>/dev/null || true
          )

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Previous version: $VERSION"

      - name: Upload new exe
        run: |

          aws s3 cp \
            $FILE \
            s3://$BUCKET/$FILE

      - name: Force failure for rollback test
        run: exit 1

      - name: Verify upload
        run: |

          aws s3api head-object \
            --bucket $BUCKET \
            --key $FILE

      - name: Rollback if failed
        if: failure()

        run: |

          if [ "${{ steps.previous.outputs.version }}" != "None" ] &&
             [ -n "${{ steps.previous.outputs.version }}" ]
          then

            echo "Restoring previous version"

            aws s3api copy-object \
              --copy-source "$BUCKET/$FILE?versionId=${{ steps.previous.outputs.version }}" \
              --bucket $BUCKET \
              --key $FILE

          fi