name: Deploy EXE with rollback

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BUCKET: lambda-function-codem
      FILE: app.exe

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build EXE
        run: |
          GOOS=windows GOARCH=amd64 \
          go build -o $FILE

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::119807136885:role/github-actions-go-s3-deploy
          aws-region: ap-south-1

      - name: Archive current exe
        id: archive
        run: |

          TS=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_FILE=archive/app_$TS.exe

          echo "archive=$ARCHIVE_FILE" >> $GITHUB_OUTPUT

          if aws s3 ls s3://$BUCKET/$FILE ; then

            aws s3 cp \
              s3://$BUCKET/$FILE \
              s3://$BUCKET/$ARCHIVE_FILE

            aws s3 rm \
              s3://$BUCKET/$FILE

            echo "old_exists=true" >> $GITHUB_OUTPUT

          else
            echo "old_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload new exe
        id: upload
        run: |

          aws s3 cp \
            $FILE \
            s3://$BUCKET/$FILE

      - name: Rollback on failure
        if: failure() && steps.archive.outputs.old_exists == 'true'
        run: |

          aws s3 cp \
            s3://$BUCKET/${{ steps.archive.outputs.archive }} \
            s3://$BUCKET/$FILE

      - name: Verify upload
        run: |

          aws s3api head-object \
            --bucket $BUCKET \
            --key $FILE
          echo "Upload verified"